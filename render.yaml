services:
  - type: web
    name: heart-disease-predictor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn ml_project.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.12.7
